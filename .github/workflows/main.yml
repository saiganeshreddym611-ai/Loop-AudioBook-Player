name: Build Android APK

# This tells GitHub to run the script every time you 'push' code to the 'main' branch
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest # It runs on a cloud version of Ubuntu, just like yours!

    steps:
      # 1. Pull your code from the repo into the virtual machine
      - uses: actions/checkout@v4

      # 2. Set up Java (required for Android)
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Install Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 4. Get the app's dependencies (the libraries for audio)
      - name: Install dependencies
        run: flutter pub get

      # 5. The "Magic" Command: Build the APK
      - name: Build APK
        run: flutter build apk --release

      # 6. Upload the finished file so you can download it
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          
