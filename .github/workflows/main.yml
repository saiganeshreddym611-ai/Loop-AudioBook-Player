name: Build Android APK

# This tells GitHub to run the script every time you 'push' code to the 'main' branch
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    # This force-enables the new engine early to clear warnings
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

    steps:
      # 1. Updated to v6
      - uses: actions/checkout@v6

      # 2. Updated to v5
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
      

      # 3. Install Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 4. Get the app's dependencies (the libraries for audio)
      - name: Install dependencies
        run: flutter pub get

      # 5. The "Magic" Command: Build the APK
      - name: Build APK
        run: flutter build apk --release

      # 6. Upload the finished file so you can download it
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          
