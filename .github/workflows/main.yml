name: Build Android APK

on:
  push:
    branches:
      - main
  pull_request:   # Optional: also build on PRs
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # Optional: pin version for consistency
          # flutter-version: '3.29.0'  # or whatever you're using

      - name: Install dependencies
        run: flutter pub get

      # Optional but recommended
      - name: Run tests
        run: flutter test

      # Optional: Analyze code
      - name: Analyze code
        run: flutter analyze

      - name: Build APK
        run: flutter build apk --release --split-per-abi   # Better for distribution

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30   # Keep artifacts longer
